cognitive-complexity-threshold = 25
too-many-arguments-threshold = 8
too-many-lines-threshold = 150
type-complexity-threshold = 250
excessive-nesting-threshold = 6
large-error-threshold = 128
future-size-threshold = 16384
stack-size-threshold = 200
array-size-threshold = 65536

# Allow unwrap/expect/panic/dbg in tests
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-dbg-in-tests = true

# Disallow std::sync primitives in production (use parking_lot or tokio::sync)
disallowed-types = [
    { path = "std::sync::Mutex", reason = "Use parking_lot::Mutex (sync) or tokio::sync::Mutex (async)" },
    { path = "std::sync::RwLock", reason = "Use parking_lot::RwLock (sync) or tokio::sync::RwLock (async)" },
    { path = "std::sync::Condvar", reason = "Use parking_lot::Condvar or tokio::sync alternatives" },
]
