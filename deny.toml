[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

# NOTE: openssl is currently used by the API for native-tls/ssh2.
# A future migration to rustls would let us deny openssl entirely:
# deny = [
#     { name = "openssl", wrappers = [] },
#     { name = "openssl-sys", wrappers = [] },
# ]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
