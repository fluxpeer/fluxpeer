language = "C"
header = "/* fluxpeer mobile node FFI. AUTOGENERATED by cbindgen — do not edit. */"
include_guard = "FP_NODE_CLIENT_SYS_H"
autogen_warning = "/* WARNING: auto-generated from fp-node-client-sys; edit the Rust FFI, not this file. */"
cpp_compat = true
style = "both"

[parse]
# Only parse our crate. The FFI surface uses primitives + inline fn pointers, so
# no dependency types need resolving — keeps cbindgen from warning on unrelated
# generic types (Framed<…>, UnboundedSender<…>) it scans in fp-node-core.
parse_deps = false
include = ["fp-node-client-sys"]

# Map Rust `target_os` cfg gates to C preprocessor #ifdefs. Harmless today (the
# current surface is platform-agnostic) but future android.rs JNI shims will be
# `#[cfg(target_os = "android")]`, and their jni-typed params are undefined on
# iOS — guarding them keeps the single header consumable from both Swift and NDK.
[defines]
"target_os = ios" = "TARGET_OS_IOS"
"target_os = android" = "TARGET_OS_ANDROID"
# `fp_enroll` is gated by the (default-on) `enroll` Cargo feature; guard it so
# the header stays honest for a `--no-default-features` (pure data-plane) build.
# Mobile builds compile with enroll on → pass `-DFP_FEATURE_ENROLL` to the C/
# Swift/NDK toolchain so the prototype is visible.
"feature = enroll" = "FP_FEATURE_ENROLL"

[export]
# Pin the surface: only our fp_* symbols (plus any types they reference). Avoids
# leaking unrelated `pub extern "C"` items that parse_deps might surface.
include = [
    "fp_generate_keypair",
    "fp_free_string",
    "fp_connect_handshake_only",
    "fp_attach_tun",
    "fp_disconnect",
    "fp_enroll",
]
exclude = []

[fn]
prefix = ""
postfix = ""
